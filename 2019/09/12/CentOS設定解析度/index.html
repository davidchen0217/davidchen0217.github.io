item-tags"><a href="/tags/" rel="section"><i class="menu-item-icon fa fa-fw fa-tags"></i><br>標籤</a></li><li class="menu-item menu-item-archives"><a href="/archives/" rel="section"><i class="menu-item-icon fa fa-fw fa-archive"></i><br>歸檔</a></li></ul></nav></div></header><main id="main" class="main"><div class="main-inner"><div class="content-wrap"><div id="content" class="content"><div id="posts" class="posts-expand"><article class="post post-type-normal" itemscope itemtype="http://schema.org/Article"><div class="post-block"><link itemprop="mainEntityOfPage" href="http://yoursite.com/2019/09/12/CentOS設定解析度/"><span hidden itemprop="author" itemscope itemtype="http://schema.org/Person"><meta itemprop="name" content="David Chen"><meta itemprop="description" content><meta itemprop="image" content="/images/avatar.gif"></span><span hidden itemprop="publisher" itemscope itemtype="http://schema.org/Organization"><meta itemprop="name" content="Dc's blog"></span><header class="post-header"><h1 class="post-title" itemprop="name headline">CentOS設定解析度</h1><div class="post-meta"><span class="post-time"><span class="post-meta-item-icon"><i class="fa fa-calendar-o"></i> </span><span class="post-meta-item-text">發表於</span> <time title="創建於" itemprop="dateCreated datePublished" datetime="2019-09-12T10:21:07+08:00">2019-09-12</time></span></div></header><div class="post-body" itemprop="articleBody"><p>Step1:先開啟Terminal</p><p>Step2:</p><figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># xrandr</span></span><br><span class="line"></span><br><span class="line">Screen 0: minimum 320 x 200, current 1920 x 1600, maximum 16384 x 16384</span><br><span class="line">DVI-I-1 connected primary 1920x1600+0+0 (normal left inverted right x axis y axis) 477mm x 268mm</span><br><span class="line">1920x1080 60.00 +</span><br><span class="line">1600x1200 60.00</span><br><span class="line">1680x1050 59.88</span><br><span class="line">1280x1024 75.02 60.02</span><br><span class="line">1440x900 59.90</span><br><span class="line">1280x960 60.00</span><br><span class="line">1280x800 74.93 59.91</span><br><span class="line">1152x864 75.00</span><br><span class="line">1024x768 75.03 70.07 60.00</span><br><span class="line">832x624 74.55</span><br><span class="line">800x600 72.19 75.00 60.32 56.25</span><br><span class="line">640x480 75.00 72.81 66.67 59.94</span><br><span class="line">720x400 70.08</span><br><span class="line">1900x1200 60.00</span><br><span class="line">1920x1600 60.00*</span><br><span class="line">HDMI-1 disconnected (normal left inverted right x axis y axis)</span><br><span class="line">VGA-1 disconnected (normal left inverted right x axis y axis)</span><br><span class="line"></span><br><span class="line">PS:看是DVI-I-1 或 HDMI-1 或 VGA-1 哪一種介面 connected</span><br></pre></td></tr></table></figure><p>Step3:</p><figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># gtf 1920 1600 60 -x</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 1920x1600 @ 60.00 Hz (GTF) hsync: 99.36 kHz; pclk: 260.72 MHz</span></span><br><span class="line">Modeline <span class="string">"1920x1600_60.00"</span> 260.72 1920 2064 2272 2624 1600 1601 1604 1656 -HSync +Vsync</span><br></pre></td></tr></table></figure><p>Step4:</p><figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># xrandr --newmode "1920x1600" 260.72 1920 2064 2272 2624 1600 1601 1604 1656 -HSync +Vsync</span></span><br><span class="line"></span><br><span class="line">PS:newmode 後面必須要接 Modeline 後面的參數</span><br></pre></td></tr></table></figure><p>Step5:</p><figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># xrandr --addmode DVI-I-1 1920x1600</span></span><br></pre></td></tr></table></figure><p>Step6:</p><figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># xrandr --output DVI-I-1 --mode 1920x1600</span></span><br></pre></td></tr></table></figure></div><footer class="post-footer"><div class="post-tags"><a href="/tags/CentOS/" rel="tag"># CentOS</a> <a href="/tags/Resolution/" rel="tag"># Resolution</a></div><div class="post-nav"><div class="post-nav-next post-nav-item"><a href="/2019/09/12/CentOS設定NTP對時/" rel="next" title="CentOS設定NTP對時"><i class="fa fa-chevron-left"></i> CentOS設定NTP對時</a></div><span class="post-nav-divider"></span><div class="post-nav-prev post-nav-item"><a href="/2019/09/12/CentOS安裝Jdk和Tomcat/" rel="prev" title="CentOS安裝Jdk和Tomcat">CentOS安裝Jdk和Tomcat <i class="fa fa-chevron-right"></i></a></div></div></footer></div></article><d
